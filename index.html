<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Production Downtime Recorder</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="container">
      <h1>Production Downtime Recorder / 停线记录</h1>

      <section class="controls">
        <label for="incidentInput">Incident details / 故障信息</label>
        <textarea
          id="incidentInput"
          placeholder="Example:\n停线时间：14:20-14:25\n故障工位：STNR10工位RB01\n故障原因：甲方来料二维码出错\n\nOr:\nProcess Step: STNR10 RB01\nCause: QR code issue"
          rows="7"
        ></textarea>

        <div class="button-row">
          <button id="toggleIncidentBtn" type="button">Start Incident / 开始停线</button>
          <button id="exportBtn" type="button">Export Excel / 导出Excel</button>
        </div>

        <p id="statusText" class="status">No active incident.</p>
      </section>

      <section>
        <h2>Recorded incidents</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Downtime</th>
                <th>Process Step</th>
                <th>Failure Mode</th>
                <th>Effect</th>
                <th>Cause</th>
                <th>Detection</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="incidentTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </body>
</html>
